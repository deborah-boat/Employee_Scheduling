# Start all three services:  docker compose up --build
# Stop and clean up:         docker compose down -v

services:

  # ── PostgreSQL database ─────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: employee_scheduling
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Express backend ─────────────────────────────────────────────────────────
  backend:
    build:
      context: ./server                          # files available to COPY are in ./server
      dockerfile: docker/backend.Dockerfile       # instructions live in ./server/docker/
    ports:
      - "4000:4000"
    environment:
      # Always points to the compose postgres service, not localhost
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/employee_scheduling
      PORT: 4000
      NODE_ENV: production
      CLIENT_ORIGIN: ${CLIENT_ORIGIN:-http://localhost:5173}
      # Auth0 secrets — put these in a .env file at the project root (never commit it)
      AUTH0_SECRET: ${AUTH0_SECRET}
      AUTH0_CLIENT_ID: ${AUTH0_CLIENT_ID}
      AUTH0_CLIENT_SECRET: ${AUTH0_CLIENT_SECRET}
      AUTH0_DOMAIN: ${AUTH0_DOMAIN}
      AUTH0_ISSUER_BASE_URL: ${AUTH0_ISSUER_BASE_URL:-}
      AUTH0_BASE_URL: ${AUTH0_BASE_URL:-http://localhost:4000}
      AUTH0_REDIRECT_URI: ${AUTH0_REDIRECT_URI}
      AUTH0_POST_LOGOUT_REDIRECT: ${AUTH0_POST_LOGOUT_REDIRECT:-http://localhost:5173}
    depends_on:
      postgres:
        condition: service_healthy
    # Pushes the current schema.prisma directly to the database (bypasses broken SQLite migrations)
    command: sh -c "node_modules/.bin/prisma db push --accept-data-loss && node index.js"

  # ── React frontend (built by Vite, served by Nginx) ─────────────────────────
  frontend:
    build:
      context: ./client                           # files available to COPY are in ./client
      dockerfile: ../server/docker/frontend.Dockerfile   # instructions live in ./server/docker/
      args:
        # The browser talks to the backend directly on port 4000
        VITE_API_BASE_URL: http://localhost:4000
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres_data:
